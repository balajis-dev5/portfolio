<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="Modern CRM cover art">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0f1a"/>
      <stop offset="1" stop-color="#181235"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <g fill="#6366f1" opacity="0.08">
    <circle cx="70" cy="70" r="2"/><circle cx="140" cy="70" r="2"/><circle cx="210" cy="70" r="2"/><circle cx="280" cy="70" r="2"/>
    <circle cx="70" cy="140" r="2"/><circle cx="140" cy="140" r="2"/><circle cx="210" cy="140" r="2"/>
    <circle cx="1130" cy="605" r="2"/><circle cx="1060" cy="605" r="2"/><circle cx="990" cy="605" r="2"/>
    <circle cx="1130" cy="535" r="2"/><circle cx="1060" cy="535" r="2"/>
  </g>

  <!-- wireframe: sidebar + stat cards + table -->
  <g transform="translate(640,120)">
    <rect x="0" y="0" width="480" height="430" rx="18" fill="#11162a" stroke="#272e4d" stroke-width="2"/>
    <rect x="0" y="0" width="110" height="430" rx="18" fill="#161c33"/>
    <rect x="22" y="28" width="66" height="10" rx="5" fill="url(#accent)"/>
    <rect x="22" y="66" width="66" height="8" rx="4" fill="#3d4569"/>
    <rect x="22" y="94" width="52" height="8" rx="4" fill="#3d4569"/>
    <rect x="22" y="122" width="60" height="8" rx="4" fill="#3d4569"/>
    <rect x="136" y="28" width="150" height="82" rx="12" fill="#1a2140" stroke="#2b3358" stroke-width="1.5"/>
    <rect x="304" y="28" width="150" height="82" rx="12" fill="#1a2140" stroke="#2b3358" stroke-width="1.5"/>
    <rect x="154" y="48" width="60" height="8" rx="4" fill="#4c5580"/>
    <rect x="154" y="72" width="90" height="14" rx="6" fill="#818cf8"/>
    <rect x="322" y="48" width="60" height="8" rx="4" fill="#4c5580"/>
    <rect x="322" y="72" width="76" height="14" rx="6" fill="#a78bfa"/>
    <g stroke="#2b3358" stroke-width="1.5">
      <rect x="136" y="136" width="318" height="266" rx="12" fill="#1a2140"/>
      <line x1="136" y1="188" x2="454" y2="188"/>
      <line x1="136" y1="242" x2="454" y2="242"/>
      <line x1="136" y1="296" x2="454" y2="296"/>
      <line x1="136" y1="350" x2="454" y2="350"/>
    </g>
    <rect x="156" y="158" width="120" height="10" rx="5" fill="#4c5580"/>
    <rect x="156" y="208" width="180" height="9" rx="4" fill="#39406a"/>
    <rect x="156" y="262" width="150" height="9" rx="4" fill="#39406a"/>
    <rect x="156" y="316" width="196" height="9" rx="4" fill="#39406a"/>
    <rect x="156" y="368" width="132" height="9" rx="4" fill="#39406a"/>
    <rect x="390" y="205" width="48" height="16" rx="8" fill="#312e81"/>
    <rect x="390" y="259" width="48" height="16" rx="8" fill="#134e4a"/>
    <rect x="390" y="313" width="48" height="16" rx="8" fill="#312e81"/>
