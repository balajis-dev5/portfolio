  <!-- title block -->
  <g font-family="ui-sans-serif, system-ui, 'Segoe UI', Roboto, sans-serif">
    <rect x="80" y="196" width="56" height="6" rx="3" fill="url(#accent)"/>
    <text x="80" y="272" font-size="64" font-weight="800" fill="#f4f4f5">Modern CRM</text>
    <text x="80" y="320" font-size="26" fill="#9ca3bd">Leads · follow-ups · analytics</text>
    <text x="80" y="358" font-size="26" fill="#9ca3bd">typed end-to-end</text>
    <g font-size="20" font-weight="600" fill="#c7d2fe">
