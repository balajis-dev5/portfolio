<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="Laravel API Template cover art">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0f1a"/>
      <stop offset="1" stop-color="#2a1020"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fb7185"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- terminal / JSON response -->
  <g transform="translate(640,120)">
    <rect x="0" y="0" width="480" height="430" rx="18" fill="#150d16" stroke="#3d2233" stroke-width="2"/>
    <rect x="0" y="0" width="480" height="52" rx="18" fill="#1e1220"/>
    <rect x="0" y="34" width="480" height="18" fill="#1e1220"/>
    <circle cx="30" cy="26" r="7" fill="#fb7185"/>
    <circle cx="56" cy="26" r="7" fill="#fbbf24"/>
    <circle cx="82" cy="26" r="7" fill="#34d399"/>
    <g font-family="ui-monospace, 'Cascadia Code', Consolas, monospace" font-size="21">
      <text x="36" y="98" fill="#8d7a8a">$ curl api/v1/auth/login</text>
      <text x="36" y="140" fill="#f4f4f5">{</text>
      <text x="66" y="176" fill="#fda4af">"token"<tspan fill="#8d7a8a">:</tspan> <tspan fill="#fcd34d">"eyJhbGciOi..."</tspan><tspan fill="#8d7a8a">,</tspan></text>
      <text x="66" y="212" fill="#fda4af">"user"<tspan fill="#8d7a8a">:</tspan> <tspan fill="#f4f4f5">{</tspan></text>
      <text x="96" y="248" fill="#fda4af">"role"<tspan fill="#8d7a8a">:</tspan> <tspan fill="#fcd34d">"admin"</tspan></text>
      <text x="66" y="284" fill="#f4f4f5">}</text>
      <text x="36" y="320" fill="#f4f4f5">}</text>
      <text x="36" y="372" fill="#34d399">201 Created <tspan fill="#8d7a8a">· 42ms</tspan></text>
    </g>
  </g>

  <!-- title block -->
  <g font-family="ui-sans-serif, system-ui, 'Segoe UI', Roboto, sans-serif">
    <rect x="80" y="186" width="56" height="6" rx="3" fill="url(#accent)"/>
    <text x="80" y="258" font-size="58" font-weight="800" fill="#f4f4f5">Laravel API</text>
    <text x="80" y="330" font-size="58" font-weight="800" fill="#f4f4f5">Template</text>
    <text x="80" y="380" font-size="26" fill="#c0a3ad">JWT · RBAC · service layer · CI-ready tests</text>
    <g font-size="20" font-weight="600" fill="#fecdd3">
      <rect x="80" y="424" width="148" height="40" rx="20" fill="#331a26"/>
      <text x="154" y="450" text-anchor="middle">Laravel 12</text>
      <rect x="242" y="424" width="120" height="40" rx="20" fill="#331a26"/>
      <text x="302" y="450" text-anchor="middle">PHP 8.3</text>
      <rect x="376" y="424" width="110" height="40" rx="20" fill="#331a26"/>
      <text x="431" y="450" text-anchor="middle">Docker</text>
    </g>
  </g>
</svg>
