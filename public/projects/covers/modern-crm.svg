      <rect x="222" y="404" width="148" height="40" rx="20" fill="#1e224a"/>
      <text x="296" y="430" text-anchor="middle">Laravel 12</text>
      <rect x="384" y="404" width="170 " height="40" rx="20" fill="#1e224a"/>
      <text x="469" y="430" text-anchor="middle">PostgreSQL</text>
    </g>
